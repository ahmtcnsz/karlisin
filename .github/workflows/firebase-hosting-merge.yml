name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install and Build
        # API anahtarını doğrudan build sürecine enjekte ediyoruz
        env:
          GEMINI_API_KEY: AIzaSyDz8gx7-6PKbfhjJKGBTXQbH09TJbD01OI
          VITE_GEMINI_API_KEY: AIzaSyDz8gx7-6PKbfhjJKGBTXQbH09TJbD01OI
        run: |
          npm ci --legacy-peer-deps
          npm run build
      - name: Firebase Deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEN_LANG_CLIENT_0551179549 }}
          channelId: live
          projectId: gen-lang-client-0551179549
